name: CI Pipeline

on:
  push:
    branches: ["master"]

  pull_request:
    branches: ["master"]

  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - load_data
          - data_quality
          - data_research
          - visualization

jobs:
  test_run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Тест працює"