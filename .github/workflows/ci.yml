name: CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску (або all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - load_data
          - data_quality
          - data_research
          - visualization

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-modules:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [load_data, data_quality, data_research, visualization]

    steps:
      - name: 1. Завантаження коду (Checkout)
        uses: actions/checkout@v4

      - name: 2. Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          # Встановлюємо потрібні бібліотеки напряму
          pip install pandas matplotlib seaborn

      - name: 4. Створення фейкових даних для тестів
        run: |
          mkdir -p data/raw
          echo "BRAND;MAKE;YEAR;COLOR;FUEL" > data/raw/reestrtz01.01.2026.csv
          echo "TOYOTA;CAMRY;2020;БІЛИЙ;БЕНЗИН" >> data/raw/reestrtz01.01.2026.csv

      - name: 5. Запуск модуля
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Запускаємо скрипт src/${{ matrix.module }}.py"
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1

      - name: 6. Збереження результатів
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.module }}
          path: |
            artifacts/${{ matrix.module }}/
            reports/figures/
          if-no-files-found: ignore