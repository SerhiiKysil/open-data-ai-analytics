name: CI (Self-Hosted)

on:
  workflow_dispatch:

jobs:
  run-local:
    runs-on: self-hosted

    steps:
      - name: 1. Завантаження коду
        uses: actions/checkout@v4

      - name: 2. Перевірка Python на твоєму ПК
        run: python --version

      - name: 3. Встановлення залежностей
        run: pip install pandas matplotlib seaborn

      - name: 4. Підготовка даних і запуск візуалізації
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/visualization
          New-Item -ItemType Directory -Force -Path data/raw
          
          "BRAND;MAKE;MAKE_YEAR;COLOR;FUEL" | Out-File -FilePath data/raw/reestrtz01.01.2026.csv -Encoding utf8
          "TOYOTA;CAMRY;2020;WHITE;GAS" | Out-File -FilePath data/raw/reestrtz01.01.2026.csv -Append -Encoding utf8
          
          Write-Host "Running script on local PC..."
          python src/visualization.py > artifacts/visualization/run.log 2>&1

      - name: 5. Збереження результатів
        uses: actions/upload-artifact@v4
        with:
          name: result-selfhosted-visualization
          path: |
            artifacts/visualization/
            reports/figures/
          if-no-files-found: ignore